<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>NovaCall · WebRTC 多人会议（SFU）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      /* 说明：本 UI 参考“轻量卡片式会议产品”的观感，但所有配色、间距、组件形态与布局均为重新设计，避免任何直接复刻。 */
      color-scheme: light;

      --bg-root: radial-gradient(1200px 520px at 25% 18%, rgba(99, 102, 241, 0.42), transparent 62%),
                 radial-gradient(900px 480px at 75% 82%, rgba(168, 85, 247, 0.35), transparent 60%),
                 linear-gradient(135deg, #eef2ff 0%, #f5f3ff 40%, #eff6ff 100%);

      --panel: rgba(255, 255, 255, 0.78);
      --panel-strong: rgba(255, 255, 255, 0.92);
      --panel-border: rgba(15, 23, 42, 0.08);

      --text-main: #0f172a;
      --text-muted: rgba(15, 23, 42, 0.62);

      --accent: #5b67ff;        /* 主色：靛蓝（自定义） */
      --accent-2: #a855f7;      /* 辅色：紫 */
      --accent-soft: rgba(91, 103, 255, 0.16);
      --accent-strong: #3843ff;

      --danger: #ef4444;
      --success: #16a34a;

      --shadow-xl: 0 30px 80px rgba(2, 6, 23, 0.18);
      --shadow-lg: 0 18px 45px rgba(2, 6, 23, 0.14);
      --shadow-md: 0 10px 25px rgba(2, 6, 23, 0.12);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-root);
      color: var(--text-main);
      overflow: hidden;
    }
    body {
      display: flex;
      align-items: stretch;
      justify-content: center;
    }
    .bg-orbits {
      position: fixed;
      inset: -120px;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(circle at 18% 20%, rgba(91, 103, 255, 0.22), transparent 60%),
        radial-gradient(circle at 82% 28%, rgba(168, 85, 247, 0.18), transparent 60%),
        radial-gradient(circle at 12% 86%, rgba(14, 165, 233, 0.12), transparent 62%);
      filter: blur(4px);
    }
    .app-shell {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1320px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 顶部导航 */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 16px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(14px);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand-logo {
      width: 32px;
      height: 32px;
      border-radius: 9999px;
      background:
        radial-gradient(circle at 30% 25%, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.55)),
        conic-gradient(from 210deg, var(--accent), var(--accent-2), rgba(14, 165, 233, 0.65), var(--accent));
      box-shadow:
        0 18px 40px rgba(91, 103, 255, 0.28),
        0 0 0 1px rgba(15, 23, 42, 0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(15, 23, 42, 0.82);
      font-weight: 800;
      font-size: 14px;
    }
    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .brand-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .brand-subtitle {
      font-size: 11px;
      color: var(--text-muted);
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 9999px;
      font-size: 11px;
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid var(--panel-border);
      box-shadow: 0 8px 18px rgba(2, 6, 23, 0.08);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 9999px;
      background: var(--danger);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.16);
      transition: background 150ms ease, box-shadow 150ms ease;
    }
    .status-dot.connected {
      background: var(--success);
      box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.18);
    }
    .status-text { color: var(--text-muted); }

    /* 页面容器：Join / Call 两个视图 */
    .page-container {
      position: relative;
      flex: 1;
      display: flex;
      min-height: 0;
    }
    .page {
      position: absolute;
      inset: 0;
      display: none;
      z-index: 1;
    }
    .page--active {
      display: block;
      z-index: 2;
    }
    .join-page.page--active {
      display: flex;
    }
    .call-page.page--active {
      display: grid;
    }

    /* Join Page */
    .join-page {
      align-items: center;
      justify-content: center;
    }
    .join-card {
      position: relative;
      width: 100%;
      max-width: 460px;
      padding: 26px 26px 24px;
      border-radius: 20px;
      background: var(--panel-strong);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow-xl);
      backdrop-filter: blur(14px);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .join-orbit {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 9999px;
      background: radial-gradient(circle at 30% 30%, rgba(91, 103, 255, 0.22), transparent 66%);
      opacity: 0.9;
      filter: blur(10px);
      pointer-events: none;
      right: -80px;
      top: -80px;
    }
    .join-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }
    .join-title-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .join-title-main {
      font-size: 20px;
      font-weight: 600;
    }
    .join-title-sub {
      font-size: 12px;
      color: var(--text-muted);
    }
    .join-chip {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 9999px;
      background: rgba(91, 103, 255, 0.10);
      border: 1px solid rgba(91, 103, 255, 0.18);
      color: var(--text-muted);
    }
    .join-fields {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .field-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field-label {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .field-label span.hint {
      font-size: 11px;
      opacity: 0.8;
    }
    .input-shell {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(15, 23, 42, 0.10);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.35);
      transition: border-color 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }
    .input-shell:focus-within {
      border-color: rgba(91, 103, 255, 0.55);
      box-shadow: 0 0 0 4px rgba(91, 103, 255, 0.14);
      background: rgba(255, 255, 255, 0.92);
    }
    .input-icon {
      width: 16px;
      height: 16px;
      color: rgba(91, 103, 255, 0.65);
      flex-shrink: 0;
    }
    .input-field {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text-main);
      font-size: 13px;
    }
    .input-field::placeholder {
      color: rgba(148, 163, 184, 0.7);
    }
    .join-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 4px;
    }
    .join-footer-left {
      font-size: 11px;
      color: var(--text-muted);
    }
    .btn-primary {
      padding: 9px 18px;
      border-radius: 14px;
      border: 1px solid rgba(91, 103, 255, 0.35);
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      color: #ffffff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 16px 40px rgba(91, 103, 255, 0.30);
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 48px rgba(91, 103, 255, 0.36);
    }
    .btn-primary:active {
      transform: scale(0.97);
      box-shadow: 0 12px 32px rgba(34, 211, 238, 0.6);
    }
    .pill-ghost {
      padding: 4px 10px;
      border-radius: 9999px;
      border: 1px solid rgba(15, 23, 42, 0.10);
      background: rgba(255, 255, 255, 0.65);
      color: rgba(15, 23, 42, 0.72);
      font-size: 11px;
      cursor: pointer;
    }
    .pill-ghost:hover {
      background: rgba(255, 255, 255, 0.82);
      border-color: rgba(91, 103, 255, 0.20);
    }

    /* 设备设置弹窗（纯 UI，不依赖第三方） */
    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.35);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 16px;
    }
    .modal-mask.show { display: flex; }
    .modal {
      width: min(560px, 100%);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(15, 23, 42, 0.10);
      box-shadow: var(--shadow-xl);
      overflow: hidden;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(15, 23, 42, 0.08);
      background: linear-gradient(135deg, rgba(91, 103, 255, 0.10), rgba(168, 85, 247, 0.08));
    }
    .modal-title {
      font-size: 14px;
      font-weight: 650;
      color: rgba(15, 23, 42, 0.86);
    }
    .icon-btn {
      border: 1px solid rgba(15, 23, 42, 0.10);
      background: rgba(255, 255, 255, 0.7);
      border-radius: 12px;
      padding: 6px 10px;
      cursor: pointer;
      color: rgba(15, 23, 42, 0.72);
    }
    .modal-body {
      padding: 14px 16px 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media (max-width: 720px) {
      .modal-body { grid-template-columns: 1fr; }
    }
    .preview {
      border-radius: 14px;
      overflow: hidden;
      background: radial-gradient(circle at 40% 30%, rgba(15, 23, 42, 0.92), rgba(2, 6, 23, 0.98));
      border: 1px solid rgba(15, 23, 42, 0.10);
      aspect-ratio: 16/9;
      position: relative;
    }
    .preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    .panel {
      border-radius: 14px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      background: rgba(255, 255, 255, 0.72);
      padding: 12px;
    }
    .panel h4 {
      margin: 0 0 10px;
      font-size: 12px;
      color: rgba(15, 23, 42, 0.70);
      font-weight: 650;
    }
    .row {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    .row label {
      font-size: 12px;
      color: rgba(15, 23, 42, 0.62);
    }
    select, .range {
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(15, 23, 42, 0.10);
      background: rgba(255, 255, 255, 0.85);
      padding: 8px 10px;
      outline: none;
    }
    .modal-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      padding: 12px 16px 16px;
      border-top: 1px solid rgba(15, 23, 42, 0.08);
      background: rgba(255, 255, 255, 0.88);
    }
    .btn-secondary {
      padding: 9px 14px;
      border-radius: 14px;
      border: 1px solid rgba(15, 23, 42, 0.10);
      background: rgba(255, 255, 255, 0.65);
      cursor: pointer;
      color: rgba(15, 23, 42, 0.78);
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.82);
    }

    /* Call Page 布局 */
    .call-page {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      width: 100%;
    }
    .call-main {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(260px, 0.8fr);
      gap: 16px;
      min-height: 0;
    }
    @media (max-width: 900px) {
      .call-main {
        grid-template-columns: minmax(0, 1fr);
        grid-template-rows: minmax(0, 1.1fr) auto;
      }
    }

    .video-panel {
      position: relative;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      padding: 14px 14px 10px;
      min-height: 0;
    }
    .video-frame {
      position: relative;
      flex: 1;
      border-radius: 16px;
      overflow: hidden;
      background: radial-gradient(circle at 40% 30%, rgba(15, 23, 42, 0.92), rgba(2, 6, 23, 0.98));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
      min-height: 220px;
    }
    .video-frame video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #020617;
    }
    .video-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 8% 0%, rgba(91, 103, 255, 0.22), transparent 62%),
        radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.16), transparent 68%);
      opacity: 0.9;
    }
    .video-local-thumb {
      position: absolute;
      right: 14px;
      bottom: 14px;
      width: 220px;
      max-width: 35%;
      aspect-ratio: 16 / 9;
      border-radius: 14px;
      overflow: hidden;
      background: rgba(15, 23, 42, 0.95);
      box-shadow: 0 18px 40px rgba(2, 6, 23, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
    .video-local-thumb video {
      transform: scaleX(-1);
    }
    .video-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      color: var(--text-muted);
      font-size: 13px;
      backdrop-filter: blur(6px);
    }
    .pulse-ring {
      width: 44px;
      height: 44px;
      border-radius: 9999px;
      border: 2px solid rgba(56, 189, 248, 0.5);
      border-top-color: rgba(56, 189, 248, 1);
      animation: spin 1.1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 右侧参与者列表 */
    .side-panel {
      border-radius: 20px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow-lg);
      padding: 14px 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }
    .thumb-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      overflow: auto;
      min-height: 0;
      padding-bottom: 6px;
    }
    @media (max-width: 900px) {
      .thumb-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    .thumb-card {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(15, 23, 42, 0.10);
      background: radial-gradient(circle at 40% 30%, rgba(15, 23, 42, 0.92), rgba(2, 6, 23, 0.98));
      box-shadow: 0 10px 22px rgba(2, 6, 23, 0.12);
      aspect-ratio: 16/10;
      cursor: pointer;
      user-select: none;
      transition: transform 120ms ease, box-shadow 120ms ease, outline-color 120ms ease;
    }
    .thumb-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 26px rgba(2, 6, 23, 0.14);
    }
    .thumb-card.pinned {
      outline: 3px solid rgba(91, 103, 255, 0.35);
      outline-offset: 2px;
    }
    .thumb-card video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: rgba(2, 6, 23, 1);
    }
    .thumb-meta {
      position: absolute;
      left: 10px;
      bottom: 10px;
      right: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: rgba(255, 255, 255, 0.92);
      font-size: 12px;
      text-shadow: 0 8px 18px rgba(0,0,0,0.45);
      pointer-events: none;
    }
    .thumb-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 650;
    }
    .thumb-badges {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }
    .badge {
      padding: 2px 8px;
      border-radius: 9999px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.18);
      font-size: 11px;
    }
    .side-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }
    .side-header span.subtitle {
      font-size: 11px;
      color: var(--text-muted);
    }
    .participant-list {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-top: 4px;
    }
    .participant-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 9999px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(51, 65, 85, 0.9);
    }
    .participant-main {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 9999px;
      background: linear-gradient(145deg, #0f172a, #1e293b);
      border: 1px solid rgba(148, 163, 184, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: #e5e7eb;
    }
    .avatar.local {
      background: linear-gradient(145deg, #0f172a, #22d3ee);
    }
    .participant-name {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .participant-tag {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 9999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(55, 65, 81, 1);
      color: var(--text-muted);
    }
    .participant-status {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-icon {
      width: 18px;
      height: 18px;
      border-radius: 9999px;
      border: 1px solid rgba(51, 65, 85, 1);
      background: rgba(15, 23, 42, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 11px;
    }
    .status-icon.on {
      border-color: rgba(34, 197, 94, 0.9);
      color: #bbf7d0;
      background: rgba(22, 163, 74, 0.2);
    }
    .status-icon.off {
      border-color: rgba(239, 68, 68, 0.9);
      color: #fecaca;
      background: rgba(127, 29, 29, 0.25);
    }

    /* 底部控制栏 */
    .call-footer {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .call-footer-left {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .pill-timer {
      padding: 3px 8px;
      border-radius: 9999px;
      border: 1px solid rgba(91, 103, 255, 0.28);
      background: rgba(255, 255, 255, 0.82);
      color: rgba(15, 23, 42, 0.88);
      font-variant-numeric: tabular-nums;
      font-size: 11px;
    }
    .call-footer-center {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .btn-circle {
      width: 48px;
      height: 48px;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: radial-gradient(circle at top, rgba(15, 23, 42, 1), rgba(15, 23, 42, 0.96));
      color: var(--text-main);
      cursor: pointer;
      position: relative;
      transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease, background 120ms ease;
      box-shadow:
        0 14px 40px rgba(15, 23, 42, 0.95),
        0 0 0 1px rgba(15, 23, 42, 1);
    }
    .btn-circle:hover {
      transform: translateY(-1px) scale(1.03);
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.98);
      border-color: rgba(148, 163, 184, 0.95);
    }
    .btn-circle:active {
      transform: scale(0.96);
      box-shadow: 0 8px 26px rgba(15, 23, 42, 0.95);
    }
    .btn-circle.accent {
      border-color: rgba(37, 99, 235, 0.9);
      background: radial-gradient(circle at 0 0, rgba(56, 189, 248, 0.9), #0f172a);
      box-shadow: 0 18px 54px rgba(56, 189, 248, 0.6);
    }
    .btn-circle.danger {
      border-color: rgba(239, 68, 68, 0.95);
      background: radial-gradient(circle at 0 0, rgba(248, 113, 113, 1), #111827);
      box-shadow: 0 20px 60px rgba(248, 113, 113, 0.65);
    }
    .btn-circle.secondary {
      border-color: rgba(91, 103, 255, 0.28);
      background: radial-gradient(circle at 0 0, rgba(255, 255, 255, 0.95), rgba(91, 103, 255, 0.22));
      box-shadow: 0 14px 36px rgba(91, 103, 255, 0.18);
      color: rgba(15, 23, 42, 0.82);
    }
    .btn-circle.toggle-off {
      opacity: 0.65;
      border-color: rgba(55, 65, 81, 1);
      box-shadow: none;
    }
    .btn-circle.toggle-off::after {
      content: "";
      position: absolute;
      width: 1px;
      height: 26px;
      background: rgba(239, 68, 68, 0.95);
      transform: rotate(-36deg);
      pointer-events: none;
    }
    .btn-icon {
      width: 22px;
      height: 22px;
    }

    .call-footer-right {
      font-size: 11px;
      color: var(--text-muted);
      text-align: right;
    }

    @media (max-width: 768px) {
      .app-shell { padding: 10px; }
      .top-bar { padding-inline: 10px; }
      .brand-subtitle { display: none; }
      .call-footer {
        flex-direction: column;
        align-items: stretch;
      }
      .call-footer-left, .call-footer-right {
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <div class="bg-orbits"></div>
  <div class="app-shell">
    <!-- 顶部导航栏 -->
    <header class="top-bar">
      <div class="brand">
        <div class="brand-logo">NC</div>

    <!-- 主页面容器：Join / Call -->
    <main class="page-container">

          <div class="join-fields">
            <div class="field-row">

              <div class="input-shell">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="7" height="7" rx="1.5"></rect>
                  <rect x="14" y="3" width="7" height="7" rx="1.5"></rect>
                  <rect x="3" y="14" width="7" height="7" rx="1.5"></rect>
                  <rect x="14" y="14" width="7" height="7" rx="1.5"></rect>
                </svg>
                <input id="roomInput" class="input-field" placeholder="例如：nova-room-001" />
                <button id="btnGenerateRoom" class="pill-ghost" type="button">随机</button>
              </div>
            </div>

            <div class="field-row">
              <label class="field-label">
                昵称（可选）
                <span class="hint">在参与者列表中显示</span>

              <div class="input-shell">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="8" r="3.2"></circle>
                  <path d="M5.5 19.5c.7-3 3.2-5 6.5-5s5.8 2 6.5 5"></path>
                </svg>
                <input id="nameInput" class="input-field" placeholder="例如：Alice / Bob" />
              </div>
            </div>

            <div class="field-row">
              <label class="field-label">
                信令服务器
                <span class="hint">保持默认即可</span>
              </label>
              <div class="input-shell">
                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="4.5" width="18" height="13" rx="2"></rect>
                  <path d="M8 19.5v1.5h8v-1.5"></path>
                </svg>
                <input id="serverInput" class="input-field" placeholder="wss://livebridge.cn/ws（或本地 ws://127.0.0.1:8080/ws）" />
              </div>
            </div>
          </div>

          <div class="join-footer">
            <div class="join-footer-left">
              建议在两台设备或两个浏览器窗口中使用相同房间号进行测试。
            </div>
            <button id="btnConnect" class="btn-primary" type="button">
              <span>Join Room</span>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14"></path>

      <!-- Call Page -->

                <div class="pulse-ring"></div>

              </div>

          <!-- 右侧参与者缩略图（最多 16） -->

            <div class="side-header">

            <div id="thumbGrid" class="thumb-grid" aria-label="参会者缩略图列表"></div>

        <!-- 底部控制栏 -->
        <footer class="call-footer">
          <div class="call-footer-left">

          </div>
          <div class="call-footer-center">
            <button id="btnToggleMic" class="btn-circle accent toggle-off" title="切换麦克风">
              <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z" />
                <path d="M19 10a7 7 0 0 1-14 0" />

              <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 7a2 2 0 0 1 2-2h7a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z" />
                <path d="M16 9l4-3v12l-4-3" />
              </svg>
            </button>
            <button id="btnHangup" class="btn-circle danger" title="挂断通话">
              <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4.5 8.5C7 6.5 9.5 5.5 12 5.5s5 1 7.5 3" />
                <path d="M4.5 8.5L3 11.5l3 2.5" />
                <path d="M19.5 8.5L21 11.5l-3 2.5" />
              </svg>
            </button>
            <button id="btnSwitchCam" class="btn-circle secondary" title="切换摄像头">
              <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 7h3l2-2h4l2 2h3a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-6a2 2 0 0 1 2-2z" />
                <path d="M10 12l-2 2-2-2" />
                <path d="M14 12l2-2 2 2" />
              </svg>
            </button>

          <div class="call-footer-right">
            NovaCall · WebRTC 多人会议（SFU / mediasoup）
          </div>
        </footer>
      </section>
    </main>
  </div>

  <script type="text/plain" data-legacy="p2p">
    // ================= WebRTC + 信令逻辑 =================
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    const joinPage = document.getElementById('joinPage');
    const callPage = document.getElementById('callPage');

    const roomInput = document.getElementById('roomInput');
    const nameInput = document.getElementById('nameInput');
    const serverInput = document.getElementById('serverInput');
    const btnConnect = document.getElementById('btnConnect');
    const btnGenerateRoom = document.getElementById('btnGenerateRoom');
    const btnBackToJoin = document.getElementById('btnBackToJoin');

    const btnToggleCam = document.getElementById('btnToggleCam');
    const btnToggleMic = document.getElementById('btnToggleMic');
    const btnHangup = document.getElementById('btnHangup');
    const btnSwitchCam = document.getElementById('btnSwitchCam');

    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const remotePlaceholder = document.getElementById('remotePlaceholder');
    const callTimerEl = document.getElementById('callTimer');
    const peerRoleEl = document.getElementById('peerRole');

    const participantLocalName = document.getElementById('participantLocalName');
    const participantRemoteName = document.getElementById('participantRemoteName');
    const participantLocalMic = document.getElementById('participantLocalMic');
    const participantLocalCam = document.getElementById('participantLocalCam');
    const participantRemoteMic = document.getElementById('participantRemoteMic');
    const participantRemoteCam = document.getElementById('participantRemoteCam');
    const avatarLocal = document.getElementById('avatarLocal');
    const avatarRemote = document.getElementById('avatarRemote');
    const roomBadge = document.getElementById('roomBadge');

    // ====== 状态变量 ======
    let ws = null;
    let roomId = '';
    let clientId = null;
    let username = '';
    let isConnected = false;
    let isCaller = false;
    let peerReady = false;
    let callStarted = false;

    let pc = null;
    let localStream = null;
    let remoteStream = null;
    let callStartTime = null;
    let callTimer = null;
    let currentCamIndex = 0;
    let availableCams = [];

    // Join/连接体验与保活/重连
    let lastServerUrl = '';
    let joinInFlight = false;
    let joinTimeoutId = null;
    let heartbeatId = null;
    let reconnectAttempt = 0;
    let manualLeave = false;

    // ====== ICE 服务器配置（STUN + TURN/TURNS）======
    // 说明：
    //   - 仅 STUN 在跨公网/复杂 NAT 下不稳定；
    //   - 加入 TURN 后，当直连失败时会自动走中继，可靠性显著提升。
    const rtcConfig = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        {
          urls: [
            'turn:turn.livebridge.cn:3478',
            'turns:turn.livebridge.cn:5349'
          ],
          username: 'webrtc',
          credential: '19894139321qwe'
        }
      ],
      // 建议保留 all：优先直连，失败再走 TURN；如果你想强制走 TURN，可改为 'relay'
      iceTransportPolicy: 'all',
      // 预先收集一些 candidate，加快建联速度（可选）
      iceCandidatePoolSize: 2
    };

    function setStatus(connected, text) {
      isConnected = connected;
      statusDot.classList.toggle('connected', connected);
      statusText.textContent = text;
    }

    function setJoinButtonLoading(loading, text) {
      joinInFlight = loading;
      btnConnect.disabled = loading;
      btnConnect.style.opacity = loading ? '0.75' : '1';
      btnConnect.style.cursor = loading ? 'not-allowed' : 'pointer';
      btnConnect.querySelector('span').textContent = text || (loading ? 'Connecting…' : 'Join Room');
    }

    function setRole(roleText) {
      if (peerRoleEl) {
        peerRoleEl.textContent = '角色：' + roleText;
      }
    }

    function enterCallPage() {
      joinPage.classList.remove('page--active');
      callPage.classList.add('page--active');
      if (roomBadge) roomBadge.textContent = roomId || '-';
    }

    function enterJoinPage() {
      callPage.classList.remove('page--active');
      joinPage.classList.add('page--active');
    }

    function updateTimer() {
      if (!callStartTime) {
        callTimerEl.textContent = '00:00';
        return;
      }
      const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
      const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const s = String(elapsed % 60).padStart(2, '0');
      callTimerEl.textContent = m + ':' + s;
    }

    function startCallTimer() {
      if (callTimer) clearInterval(callTimer);
      callStartTime = Date.now();
      callTimer = setInterval(updateTimer, 1000);
    }

    function stopCallTimer() {
      if (callTimer) clearInterval(callTimer);
      callTimer = null;
      callStartTime = null;
      updateTimer();
    }

    function randomId() {
      return Math.random().toString(36).slice(2, 10);
    }

    function setParticipantLocalName(name) {
      const displayName = name || '你';
      participantLocalName.textContent = displayName;
      avatarLocal.textContent = displayName.slice(0, 1) || '你';
    }

    function setParticipantRemoteName(name) {
      const displayName = name || '对方';
      participantRemoteName.textContent = displayName;
      avatarRemote.textContent = displayName.slice(0, 1) || '对';
    }

    function setLocalMicState(on) {
      participantLocalMic.classList.remove('on', 'off');
      participantLocalMic.classList.add(on ? 'on' : 'off');
    }

    function setLocalCamState(on) {
      participantLocalCam.classList.remove('on', 'off');
      participantLocalCam.classList.add(on ? 'on' : 'off');
    }

    function setRemoteMicState(on) {
      participantRemoteMic.classList.remove('on', 'off');
      participantRemoteMic.classList.add(on ? 'on' : 'off');
    }

    function setRemoteCamState(on) {
      participantRemoteCam.classList.remove('on', 'off');
      participantRemoteCam.classList.add(on ? 'on' : 'off');
    }

    async function enumerateCameras() {
      const devices = await navigator.mediaDevices.enumerateDevices();
      availableCams = devices.filter(d => d.kind === 'videoinput');
    }

    async function getUserMediaForCall() {
      if (localStream) return localStream;

      await enumerateCameras();
      let videoConstraints = true;
      if (availableCams.length > 0) {
        const deviceId = availableCams[currentCamIndex % availableCams.length].deviceId;
        videoConstraints = { deviceId: { exact: deviceId } };
      }

      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          video: videoConstraints,
          audio: true
        });
      } catch (e) {
        console.error('getUserMedia 失败:', e);
        alert(
          '获取摄像头/麦克风失败。\n\n' +
          '可能原因：\n' +
          '1）未授权浏览器使用摄像头/麦克风；\n' +
          '2）未通过 http://localhost 访问页面；\n\n' +
          '错误信息：' + (e && e.message ? e.message : e)
        );
        throw e;
      }

      localVideo.srcObject = localStream;
      setLocalMicState(localStream.getAudioTracks().some(t => t.enabled));
      setLocalCamState(localStream.getVideoTracks().some(t => t.enabled));

      return localStream;
    }

    async function createPeerConnection() {
      pc = new RTCPeerConnection(rtcConfig);

      pc.onicecandidate = (event) => {
        if (event.candidate) {
          sendSignal({
            type: 'candidate',
            candidate: event.candidate
          });
        }
      };

      pc.ontrack = (event) => {
        if (!remoteStream) {
          remoteStream = new MediaStream();
          remoteVideo.srcObject = remoteStream;
        }
        remoteStream.addTrack(event.track);
        remotePlaceholder.style.display = 'none';

        const hasVideo = remoteStream.getVideoTracks().length > 0;
        setRemoteCamState(hasVideo);
      };

      pc.onconnectionstatechange = () => {
        if (pc.connectionState === 'connected') {
          startCallTimer();
        }
        if (pc.connectionState === 'disconnected' ||
            pc.connectionState === 'failed' ||
            pc.connectionState === 'closed') {
          stopCallTimer();
        }
      };

      const stream = await getUserMediaForCall();
      stream.getTracks().forEach(track => pc.addTrack(track, stream));
    }

    function closePeerConnection() {
      if (pc) {
        pc.close();
        pc = null;
      }
      if (remoteStream) {
        remoteStream.getTracks().forEach(t => t.stop());
        remoteStream = null;
      }
      remoteVideo.srcObject = null;
      remotePlaceholder.style.display = '';
      stopCallTimer();
      callStarted = false;
      peerReady = false;
      setRemoteMicState(false);
      setRemoteCamState(false);
    }

    function resetToJoin() {
      // 断开信令与通话资源，回到 Join 页面
      manualLeave = true;
      try { sendSignal({ type: 'leave' }); } catch {}
      closePeerConnection();
      if (ws) {
        try { ws.close(); } catch {}
      }
      ws = null;
      setStatus(false, '未连接');
      setRole('未连接');
      enterJoinPage();
      stopHeartbeat();
      setJoinButtonLoading(false, 'Join Room');
    }

    function startHeartbeat() {
      stopHeartbeat();
      // 25s 发送一次，规避常见反代 60s 空闲断开
      heartbeatId = setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          try { ws.send(JSON.stringify({ type: 'ping' })); } catch {}
        }
      }, 25000);
    }

    function stopHeartbeat() {
      if (heartbeatId) clearInterval(heartbeatId);
      heartbeatId = null;
    }

    function scheduleReconnect() {
      if (manualLeave) return;
      reconnectAttempt += 1;
      const delay = Math.min(15000, 1000 * Math.pow(2, Math.min(reconnectAttempt, 4))); // 1s/2s/4s/8s/15s
      setStatus(false, `已断开，${delay / 1000}s 后重连…`);
      setTimeout(() => {
        if (manualLeave) return;
        // 自动重连：保持在通话页，不弹回 Join
        connectSignaling({ silent: true });
      }, delay);
    }

    function sendSignal(payload) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const msg = Object.assign({}, payload, {
        roomId,
        clientId,
        name: username || undefined
      });
      ws.send(JSON.stringify(msg));
    }

    // ================= WebSocket 信令 =================
    function connectSignaling(opts = {}) {
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
        return;
      }

      const serverUrl = serverInput.value.trim() || 'ws://127.0.0.1:8080';
      roomId = roomInput.value.trim();
      username = nameInput.value.trim();

      if (!roomId) {
        alert('请先输入房间号');
        return;
      }

      manualLeave = false;
      clientId = randomId();
      isCaller = false;
      peerReady = false;
      callStarted = false;
      lastServerUrl = serverUrl;
      reconnectAttempt = opts.silent ? reconnectAttempt : 0;

      if (!opts.silent) {
        setJoinButtonLoading(true, 'Connecting…');
        setStatus(false, '连接中…');
        // 连接超时提示
        if (joinTimeoutId) clearTimeout(joinTimeoutId);
        joinTimeoutId = setTimeout(() => {
          if (ws && ws.readyState !== WebSocket.OPEN) {
            setJoinButtonLoading(false, 'Join Room');
            setStatus(false, '连接超时');
            alert('连接信令服务器超时，请检查：\n- 服务器地址是否正确\n- 网络/防火墙/反代是否正常');
            try { ws.close(); } catch {}
          }
        }, 8000);
      }

      ws = new WebSocket(serverUrl);

      ws.onopen = () => {
        setStatus(true, '已连接信令服务器');
        setRole('房客（等待匹配）');
        enterCallPage();
        setParticipantLocalName(username);
        setParticipantRemoteName('');
        sendSignal({ type: 'join' });
        startHeartbeat();
        setJoinButtonLoading(false, 'Join Room');
        if (joinTimeoutId) clearTimeout(joinTimeoutId);
        joinTimeoutId = null;
      };

      ws.onmessage = async (event) => {
        let data;
        try {
          data = JSON.parse(event.data);
        } catch {
          return;
        }
        if (data.clientId === clientId) return;

        if (data.type === 'pong') {
          // 心跳响应，无需处理
          return;
        }

        if (data.name && !participantRemoteName.textContent) {
          setParticipantRemoteName(data.name);
        }

        switch (data.type) {
          case 'ready':
            peerReady = true;
            if (data.role === 'caller') {
              isCaller = true;
              setRole('呼叫方（可发起）');
            } else {
              isCaller = false;
              setRole('被呼叫方（等待呼叫）');
            }
            break;
          case 'offer':
            isCaller = false;
            setRole('被呼叫方');
            await handleOffer(data.sdp);
            break;
          case 'answer':
            await handleAnswer(data.sdp);
            break;
          case 'candidate':
            await handleCandidate(data.candidate);
            break;
          case 'leave':
            closePeerConnection();
            break;
        }
      };

      ws.onclose = () => {
        stopHeartbeat();
        if (manualLeave) {
          setStatus(false, '未连接');
          setRole('未连接');
          closePeerConnection();
          enterJoinPage();
          return;
        }
        // BUG 修复：不要自动弹回 Join 页；改为留在通话页并自动重连
        closePeerConnection();
        scheduleReconnect();
      };

      ws.onerror = () => {
        // 连接中阶段的错误让用户有感知
        if (!opts.silent) {
          setStatus(false, '连接出错');
          setJoinButtonLoading(false, 'Join Room');
        }
      };
    }

    async function startCallAsCaller() {
      if (!pc) await createPeerConnection();
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      sendSignal({ type: 'offer', sdp: offer });
      callStarted = true;
    }

    async function handleOffer(offer) {
      if (!pc) await createPeerConnection();
      await pc.setRemoteDescription(new RTCSessionDescription(offer));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      sendSignal({ type: 'answer', sdp: answer });
      callStarted = true;
    }

    async function handleAnswer(answer) {
      if (!pc) return;
      await pc.setRemoteDescription(new RTCSessionDescription(answer));
    }

    async function handleCandidate(candidate) {
      if (!pc) return;
      try {
        await pc.addIceCandidate(new RTCIceCandidate(candidate));
      } catch (e) {
        console.error('添加 ICE Candidate 失败:', e);
      }
    }

    // ================= 交互逻辑 =================
    btnConnect.addEventListener('click', () => {
      connectSignaling();
    });

    btnGenerateRoom.addEventListener('click', () => {
      const id = 'nova-' + Math.random().toString(36).slice(2, 8);
      roomInput.value = id;
    });

    btnToggleCam.addEventListener('click', async () => {
      if (!localStream) {
        await getUserMediaForCall();
        btnToggleCam.classList.remove('toggle-off');
      }
      const videoTracks = localStream.getVideoTracks();
      if (videoTracks.length === 0) return;
      const track = videoTracks[0];
      track.enabled = !track.enabled;
      btnToggleCam.classList.toggle('toggle-off', !track.enabled);
      setLocalCamState(track.enabled);

      if (peerReady && isCaller && !callStarted && track.enabled) {
        await startCallAsCaller();
      }
    });

    btnToggleMic.addEventListener('click', async () => {
      if (!localStream) {
        await getUserMediaForCall();
        btnToggleMic.classList.remove('toggle-off');
      }
      const audioTracks = localStream.getAudioTracks();
      if (audioTracks.length === 0) return;
      const track = audioTracks[0];
      track.enabled = !track.enabled;
      btnToggleMic.classList.toggle('toggle-off', !track.enabled);
      setLocalMicState(track.enabled);

      if (peerReady && isCaller && !callStarted && track.enabled) {
        await startCallAsCaller();
      }
    });

    btnHangup.addEventListener('click', () => {
      sendSignal({ type: 'leave' });
      closePeerConnection();
    });

    btnBackToJoin.addEventListener('click', () => {
      resetToJoin();
    });

    btnSwitchCam.addEventListener('click', async () => {
      if (!localStream) {
        await getUserMediaForCall();
        return;
      }
      currentCamIndex = (currentCamIndex + 1) % (availableCams.length || 1);
      localStream.getVideoTracks().forEach(t => t.stop());

      await enumerateCameras();
      let videoConstraints = true;
      if (availableCams.length > 0) {
        const deviceId = availableCams[currentCamIndex % availableCams.length].deviceId;
        videoConstraints = { deviceId: { exact: deviceId } };
      }
      const newStream = await navigator.mediaDevices.getUserMedia({
        video: videoConstraints,
        audio: localStream.getAudioTracks().length > 0
      });

      localStream = newStream;
      localVideo.srcObject = localStream;
      setLocalCamState(localStream.getVideoTracks().some(t => t.enabled));
      setLocalMicState(localStream.getAudioTracks().some(t => t.enabled));

      if (pc) {
        const senders = pc.getSenders().filter(s => s.track && s.track.kind === 'video');
        const newVideoTrack = newStream.getVideoTracks()[0];
        if (newVideoTrack) {
          if (senders.length > 0) {
            senders[0].replaceTrack(newVideoTrack);
          } else {
            pc.addTrack(newVideoTrack, newStream);
          }
        }
      }
    });

    // 初始化默认服务器地址：
    // 你已部署到云端，因此默认指向 wss://livebridge.cn/ws
    // 如果你要本地跑，也可以改成 ws://127.0.0.1:8080
    serverInput.value = 'wss://livebridge.cn/ws';
    updateTimer();

    // 兜底：页面初始化时强制进入 Join 页面（避免异常状态直接显示通话页）
    enterJoinPage();

    // 兜底：捕获运行时错误，避免按钮“无反馈”但实际脚本已崩溃
    window.addEventListener('error', (e) => {
      console.error('运行时错误:', e.error || e.message || e);
      alert('页面脚本发生错误，已在控制台输出详细信息。\\n\\n' +
            '建议按 F12 打开 Console 查看错误。\\n' +
            '错误摘要：' + (e.message || 'unknown'));
    });
  </script>

  <script src="/app.js"></script>
  <!-- 设备设置弹窗（仅 UI + 本地预览，不影响 SFU 逻辑） -->
  <div id="settingsModal" class="modal-mask" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-label="设备与媒体设置">
      <div class="modal-header">
        <div class="modal-title">设备与媒体设置</div>
        <button id="btnCloseSettings" class="icon-btn" type="button">关闭</button>
      </div>
      <div class="modal-body">
        <div class="preview">
          <video id="settingsPreviewVideo" playsinline autoplay muted></video>
        </div>
        <div class="panel">
          <h4>设备选择</h4>
          <div class="row">
            <label for="selCamera">摄像头</label>
            <select id="selCamera"></select>
          </div>
          <div class="row">
            <label for="selMic">麦克风</label>
            <select id="selMic"></select>
          </div>
          <div class="row">
            <label for="selRes">分辨率</label>
            <select id="selRes">
              <option value="qvga">320×240（省流）</option>
              <option value="vga">640×480（推荐）</option>
              <option value="hd" selected>1280×720（高清）</option>
            </select>
          </div>
          <div class="row">
            <label for="rngVol">输入音量</label>
            <input id="rngVol" class="range" type="range" min="0" max="100" value="70" />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btnResetSettings" class="btn-secondary" type="button">恢复默认</button>
        <button id="btnSaveSettings" class="btn-primary" type="button">保存</button>
      </div>
    </div>
  </div>
  <script>
    // 设备设置弹窗：只做本地预览与选择（不直接侵入 SFU 逻辑）
    (function () {
      const modal = document.getElementById('settingsModal');
      const openBtn = document.getElementById('btnOpenSettings');
      const closeBtn = document.getElementById('btnCloseSettings');
      const saveBtn = document.getElementById('btnSaveSettings');
      const resetBtn = document.getElementById('btnResetSettings');

      const video = document.getElementById('settingsPreviewVideo');
      const selCamera = document.getElementById('selCamera');
      const selMic = document.getElementById('selMic');
      const selRes = document.getElementById('selRes');

      let previewStream = null;

      function show() {
        modal.classList.add('show');
        modal.setAttribute('aria-hidden', 'false');
      }
      function hide() {
        modal.classList.remove('show');
        modal.setAttribute('aria-hidden', 'true');
      }
      function stopPreview() {
        if (!previewStream) return;
        previewStream.getTracks().forEach(t => t.stop());
        previewStream = null;
        if (video) video.srcObject = null;
      }

      function resToConstraints(v) {
        if (v === 'qvga') return { width: { ideal: 320 }, height: { ideal: 240 } };
        if (v === 'vga') return { width: { ideal: 640 }, height: { ideal: 480 } };
        return { width: { ideal: 1280 }, height: { ideal: 720 } };
      }

      async function refreshDeviceLists() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const cams = devices.filter(d => d.kind === 'videoinput');
        const mics = devices.filter(d => d.kind === 'audioinput');

        selCamera.innerHTML = cams.map((d, i) => `<option value="${d.deviceId}">${d.label || `摄像头 ${i + 1}`}</option>`).join('');
        selMic.innerHTML = mics.map((d, i) => `<option value="${d.deviceId}">${d.label || `麦克风 ${i + 1}`}</option>`).join('');
      }

      async function startPreview() {
        stopPreview();
        const camId = selCamera.value || undefined;
        const micId = selMic.value || undefined;
        const res = resToConstraints(selRes.value);

        try {
          previewStream = await navigator.mediaDevices.getUserMedia({
            video: camId ? { deviceId: { exact: camId }, ...res } : { ...res },
            audio: micId ? { deviceId: { exact: micId } } : true
          });
        } catch (e) {
          console.warn('Failed to get both video and audio in settings, trying audio only', e);
          try {
            previewStream = await navigator.mediaDevices.getUserMedia({
              video: false,
              audio: micId ? { deviceId: { exact: micId } } : true
            });
          } catch (e2) {
             console.error('Failed to get any media', e2);
             return;
          }
        }
        if (video) video.srcObject = previewStream;
      }

      openBtn?.addEventListener('click', async () => {
        try {
          // 先拿一次权限，确保能拿到 label
          let tmp;
          try {
            tmp = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
          } catch (e) {
            tmp = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
          }
          tmp.getTracks().forEach(t => t.stop());
          await refreshDeviceLists();
          show();
          await startPreview();
        } catch (e) {
          alert('无法打开设备设置：请检查浏览器权限或设备占用。');
        }
      });

      closeBtn?.addEventListener('click', () => {
        stopPreview();
        hide();
      });

      modal?.addEventListener('click', (e) => {
        if (e.target === modal) {
          stopPreview();
          hide();
        }
      });

      selCamera?.addEventListener('change', startPreview);
      selMic?.addEventListener('change', startPreview);
      selRes?.addEventListener('change', startPreview);

      resetBtn?.addEventListener('click', async () => {
        selRes.value = 'hd';
        await refreshDeviceLists();
        await startPreview();
      });

      saveBtn?.addEventListener('click', () => {
        // 仅保存到 localStorage，后续我们再把它接入 SFU 的 replaceTrack / 约束更新
        const pref = {
          cam: selCamera.value || '',
          mic: selMic.value || '',
          res: selRes.value || 'hd'
        };
        localStorage.setItem('novacall_device_pref', JSON.stringify(pref));
        alert('已保存。下次进入会议会优先使用你的选择（后续会接入会议中热切换）。');
        stopPreview();
        hide();
      });

      // 读取历史偏好
      try {
        const pref = JSON.parse(localStorage.getItem('novacall_device_pref') || 'null');
        if (pref?.res) selRes.value = pref.res;
      } catch {}
    })();
  </script>
